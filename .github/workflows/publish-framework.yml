name: Publish @yeongseoksong/framework

on:
  push:
    tags:
      - '@yeongseoksong/framework@*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.11.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build framework
        run: pnpm --filter @yeongseoksong/framework build

      - name: Publish to npm
        run: pnpm --filter @yeongseoksong/framework publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
